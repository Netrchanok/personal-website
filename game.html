<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Number Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="game.html">Game</a>
      <a href="cv.html">Curriculum Vitae</a>
    </nav>
  </header>

  <main>
    <div class="hero" style="min-height: 60vh;">
      <h1>เกมทายตัวเลข</h1>
      <p>ฉันสุ่มตัวเลข 1-100 ไว้ในใจ ลองทายดูสิว่าคือเลขอะไร!</p>

      <div class="game-container">
        <input type="number" id="guess" class="game-input" placeholder="ใส่ตัวเลข 1-100">
        <button onclick="checkGuess()" class="btn">ทายเลย!</button>
      </div>

      <p id="result"></p>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 My Website</p>
  </footer>

  <script>
    const secretNumber = Math.floor(Math.random() * 100) + 1;

    function checkGuess() {
      const guess = Number(document.getElementById("guess").value);
      const result = document.getElementById("result");

      if (guess === secretNumber) {
        result.textContent = "ถูกต้อง! คุณชนะแล้ว 🎉";
      } else if (guess > secretNumber) {
        result.textContent = "สูงไป ลองใหม่!";
      } else {
        result.textContent = "ต่ำไป ลองใหม่!";
      }
    }
  </script>
</body>
</html>
